        generation: 1
        status:
          conditions: []
        created_time: '2025-06-01T00:00:00Z'
        updated_time: '2025-06-01T10:02:00Z'
        created_by: user-123@example.com
        updated_by: user-123@example.com
    ChannelCreateRequest:
      type: object
      required:
        - name
        - spec
      properties:
        id:
          type: string
          description: Resource identifier
        kind:
          type: string
          description: Resource kind
        href:
          type: string
          description: Resource URI
        labels:
          type: object
          additionalProperties:
            type: string
          description: labels for the API resource as pairs of name:value strings
        name:
          type: string
          minLength: 1
          maxLength: 63
          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
        spec:
          $ref: '#/components/schemas/ChannelSpec'
      example:
        kind: Channel
        name: stable
        labels:
          tier: production
        spec:
          is_default: true
          enabled_regex: ^4\.\d+\.\d+$
    ChannelList:
      type: object
      required:
        - page
        - size
        - total
        - items
      properties:
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        total:
          type: integer
          format: int32
        items:
          type: array
