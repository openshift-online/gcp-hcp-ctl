components:
  parameters:
    QueryParams.order:
      name: order
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/OrderDirection'
      explode: false
    QueryParams.orderBy:
      name: orderBy
      in: query
      required: false
      schema:
        type: string
        default: created_time
      explode: false
    QueryParams.page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 1
      explode: false
    QueryParams.pageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 20
      explode: false
    SearchParams:
      name: search
      in: query
      required: false
      description: |-
        Filter results using TSL (Tree Search Language) query syntax.
        Examples: `status.conditions.Reconciled='True'`, `name in ('c1','c2')`, `labels.region='us-east'`
      schema:
        type: string
      explode: false
  schemas:
    AdapterCondition:
      type: object
      required:
        - type
        - last_transition_time
        - status
      properties:
        type:
          type: string
          description: Condition type
        reason:
          type: string
          description: Machine-readable reason code
        message:
          type: string
          description: Human-readable message
        last_transition_time:
          type: string
          format: date-time
          description: |-
            When this condition last transitioned status (API-managed)
            Only updated when status changes (True/False), not when reason/message changes
        status:
          $ref: '#/components/schemas/AdapterConditionStatus'
      description: |-
        Condition in AdapterStatus
        Used for standard Kubernetes condition types: "Available", "Applied", "Health", "Finalized"
        Note: observed_generation is at AdapterStatus level, not per-condition,
        since all conditions in one AdapterStatus share the same observed generation
    AdapterConditionStatus:
      type: string
      enum:
        - 'True'
        - 'False'
        - Unknown
      description: Status value for adapter conditions
    AdapterStatus:
      type: object
      required:
        - adapter
        - observed_generation
        - conditions
        - created_time
        - last_report_time
      properties:
        adapter:
          type: string
          description: Adapter name (e.g., "validator", "dns", "provisioner")
        observed_generation:
          type: integer
          format: int32
          description: Which generation of the resource this status reflects
        metadata:
          type: object
          properties:
            job_name:
              type: string
            job_namespace:
              type: string
            attempt:
              type: integer
              format: int32
            started_time:
              type: string
              format: date-time
            completed_time:
              type: string
              format: date-time
            duration:
              type: string
          description: Job execution metadata
        data:
          type: object
          additionalProperties: {}
          description: Adapter-specific data (structure varies by adapter type)
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/AdapterCondition'
          description: |-
            Kubernetes-style conditions tracking adapter state
            Typically includes: Available, Applied, Health, Finalized
        created_time:
          type: string
          format: date-time
          description: When this adapter status was first created (API-managed)
        last_report_time:
          type: string
          format: date-time
          description: |-
            When this adapter last reported its status (API-managed)
            Updated every time the adapter PUTs, even if conditions haven't changed
            Used by Sentinel to detect adapter liveness
      description: |-
        AdapterStatus represents the complete status report from an adapter
        Contains multiple conditions, job metadata, and adapter-specific data
      example:
        adapter: adapter1
        observed_generation: 1
        conditions:
          - type: Available
            status: 'True'
            reason: This adapter1 is available
            message: This adapter1 is available
            last_transition_time: '2021-01-01T10:00:00Z'
          - type: Applied
            status: 'True'
            reason: Validation job applied
            message: Adapter1 validation job applied successfully
            last_transition_time: '2021-01-01T10:00:00Z'
          - type: Health
            status: 'True'
            reason: All adapter1 operations completed successfully
            message: All adapter1 runtime operations completed successfully
            last_transition_time: '2021-01-01T10:00:00Z'
          - type: Finalized
            status: 'True'
            reason: All resources deleted; cleanup confirmed
            message: All resources deleted; cleanup confirmed
            last_transition_time: '2021-01-01T10:00:00Z'
        metadata:
          job_name: validator-job-abc123
          job_namespace: hyperfleet-system
          attempt: 1
          started_time: '2021-01-01T10:00:00Z'
          completed_time: '2021-01-01T10:02:00Z'
          duration: 2m
        data:
          validation_results:
            total_tests: 30
            passed: 30
            failed: 0
        created_time: '2021-01-01T10:00:00Z'
        last_report_time: '2021-01-01T10:02:00Z'
    AdapterStatusList:
      type: object
      required:
        - page
        - size
        - total
        - items
      properties:
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        total:
          type: integer
          format: int32
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdapterStatus'
      description: List of adapter statuses with pagination metadata
      example:
        page: 1
        size: 2
        total: 2
        items:
          - adapter: adapter1
            observed_generation: 1
            conditions:
              - type: Available
                status: 'True'
                reason: This adapter1 is available
                message: This adapter1 is available
                last_transition_time: '2021-01-01T10:00:00Z'
            metadata:
              job_name: validator-job-abc123
              duration: 2m
            created_time: '2021-01-01T10:00:00Z'
            last_report_time: '2021-01-01T10:02:00Z'
          - adapter: adapter2
            observed_generation: 1
            conditions:
              - type: Available
                status: 'True'
                reason: This adapter2 is available
                message: This adapter2 is available
                last_transition_time: '2021-01-01T10:01:00Z'
            created_time: '2021-01-01T10:01:00Z'
            last_report_time: '2021-01-01T10:01:30Z'
    BadRequestDetails:
      type: object
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
      example:
        type: https://api.hyperfleet.io/errors/validation-error
        title: Validation Failed
        status: 400
        detail: The cluster name field is required
        instance: /api/hyperfleet/v1/clusters
        code: HYPERFLEET-VAL-001
        timestamp: '2024-01-15T10:30:00Z'
        trace_id: aabbccddeeff0011
    BearerAuth:
      type: object
      required:
        - type
        - scheme
      properties:
        type:
          type: string
          enum:
            - http
        scheme:
          type: string
          enum:
            - bearer
    Channel:
      type: object
      required:
        - name
        - spec
        - created_time
        - updated_time
        - created_by
        - updated_by
        - generation
        - status
      properties:
        id:
          type: string
          description: Resource identifier
        kind:
          type: string
          description: Resource kind
        href:
          type: string
          description: Resource URI
        labels:
          type: object
          additionalProperties:
            type: string
          description: labels for the API resource as pairs of name:value strings
        name:
          type: string
          minLength: 1
          maxLength: 63
          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
        spec:
          $ref: '#/components/schemas/ChannelSpec'
        created_time:
          type: string
          format: date-time
          description: Timestamp when the resource was created
        updated_time:
          type: string
          format: date-time
          description: Timestamp when the resource was last updated
        created_by:
          type: string
          format: email
          description: Identity that created the resource
        updated_by:
          type: string
          format: email
          description: Identity that last updated the resource
        deleted_time:
          type: string
          format: date-time
          description: Timestamp when deletion was requested; omitted if not marked for deletion
        deleted_by:
          type: string
          format: email
          description: Identity that requested deletion; omitted if not marked for deletion
        generation:
          type: integer
          format: int32
          minimum: 1
        status:
          $ref: '#/components/schemas/ResourceStatus'
      example:
        kind: Channel
        id: 019466a2-1234-7abc-9def-0123456789ab
        href: /api/hyperfleet/v1/channels/019466a2-1234-7abc-9def-0123456789ab
        name: stable
        labels:
          tier: production
