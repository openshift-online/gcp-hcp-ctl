openapi: 3.0.0
info:
  title: HyperFleet GCP API
  version: 1.0.0
  contact:
    name: GCP HCP Team
    url: https://github.com/openshift-online/gcp-hcp-ctl
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  description: |-
    HyperFleet GCP API provides CRUD operations for managing OpenShift hosted control plane
    clusters on Google Cloud Platform.

    **Architecture**: Simple CRUD only, no business logic, no event creation.
    Sentinel operator handles all orchestration logic.
    Adapters handle the specifics of managing spec.
tags:
  - name: Clusters
  - name: NodePools
  - name: Channels
  - name: Versions
  - name: WifConfigs
paths:
  /api/hyperfleet/v1/channels:
    get:
      operationId: getChannels
      summary: List channels
      description: Returns a paginated list of channels, optionally filtered by labels or TSL query.
      parameters:
        - $ref: '#/components/parameters/SearchParams'
        - $ref: '#/components/parameters/QueryParams.page'
        - $ref: '#/components/parameters/QueryParams.pageSize'
        - $ref: '#/components/parameters/QueryParams.orderBy'
        - $ref: '#/components/parameters/QueryParams.order'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelList'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestDetails'
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      tags:
        - Channels
      security:
        - BearerAuth: []
    post:
      operationId: postChannel
      summary: Create channel
      description: Creates a new channel.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestDetails'
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      tags:
        - Channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelCreateRequest'
      security:
        - BearerAuth: []
  /api/hyperfleet/v1/channels/{channel_id}:
