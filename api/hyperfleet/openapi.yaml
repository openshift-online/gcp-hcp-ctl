    ResourceCondition:
      type: object
      required:
        - type
        - last_transition_time
        - status
        - observed_generation
        - created_time
        - last_updated_time
      properties:
        type:
          type: string
          description: Condition type
        reason:
          type: string
          description: Machine-readable reason code
        message:
          type: string
          description: Human-readable message
        last_transition_time:
          type: string
          format: date-time
          description: |-
            When this condition last transitioned status (API-managed)
            Only updated when status changes (True/False), not when reason/message changes
        status:
          $ref: '#/components/schemas/ResourceConditionStatus'
        observed_generation:
          type: integer
          format: int32
          description: Generation of the spec that this condition reflects
        created_time:
          type: string
          format: date-time
          description: When this condition was first created (API-managed)
        last_updated_time:
          type: string
          format: date-time
          description: |-
            When the corresponding adapter last reported (API-managed)
            Updated every time the adapter PUTs, even if condition status hasn't changed
            Copied from AdapterStatus.last_report_time
      description: |-
        Condition in Cluster/NodePool status
        Used for semantic condition types: "ValidationSuccessful", "DNSSuccessful", "NodePoolSuccessful", etc.
        Includes observed_generation and last_updated_time to track adapter-specific state
    ResourceConditionStatus:
      type: string
      enum:
        - 'True'
        - 'False'
      description: Status value for resource conditions
    ResourceStatus:
      type: object
      required:
