        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterPatchRequest'
      security:
        - BearerAuth: []
    delete:
      operationId: deleteClusterById
      summary: Request cluster deletion
      description: |-
        Marks the cluster for deletion by setting deleted_time to the current time, cascades to its nodepools.
        The cluster remains in the database until it is fully deleted.
        Returns the updated cluster with generation incremented.
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: The request has been accepted for processing, but processing has not yet completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
              example:
                kind: Cluster
                id: 019466a0-8f8e-7abc-9def-0123456789ab
                href: https://api.hyperfleet.com/v1/clusters/019466a0-8f8e-7abc-9def-0123456789ab
                name: my-gcp-cluster
                labels:
                  env: dev
                  shard: '1'
                spec:
                  infraID: my-gcp-cluster
                  issuerURL: https://oidc.dev-reg-us-c1-abc123.dev.gcp-hcp.devshift.net/my-gcp-cluster
                  platform:
                    type: gcp
                    gcp:
                      projectID: my-gcp-project-123
                      region: us-central1
                      network: dev-mgt-us-c1-vpc
                      subnet: dev-mgt-us-c1-psc-001
                      endpointAccess: PublicAndPrivate
                      workloadIdentity:
                        projectNumber: '123456789012'
                        poolID: my-gcp-cluster-pool
                        providerID: my-gcp-cluster-provider
                        serviceAccountsRef:
                          controlPlaneEmail: my-gcp-cluster-ctrlplane@my-gcp-project-123.iam.gserviceaccount.com
                          nodePoolEmail: my-gcp-cluster-nodepool@my-gcp-project-123.iam.gserviceaccount.com
                          cloudControllerEmail: my-gcp-cluster-cloud-ctrl@my-gcp-project-123.iam.gserviceaccount.com
                          storageEmail: my-gcp-cluster-gcp-pd-csi@my-gcp-project-123.iam.gserviceaccount.com
                          imageRegistryEmail: my-gcp-cluster-img-reg@my-gcp-project-123.iam.gserviceaccount.com
                          networkEmail: my-gcp-cluster-cloud-net@my-gcp-project-123.iam.gserviceaccount.com
                  release:
                    version: 4.18.0
                    channelGroup: candidate
                generation: 2
                status:
                  conditions:
                    - type: Reconciled
                      status: 'True'
                      reason: ReconciledAll
                      message: All required adapters reported Available=True or Finalized=True at the current generation
                      observed_generation: 2
                      created_time: '2021-01-01T10:00:00Z'
                      last_updated_time: '2021-01-01T10:00:00Z'
                      last_transition_time: '2021-01-01T10:00:00Z'
                    - type: LastKnownReconciled
                      status: 'True'
                      reason: AllAdaptersReconciled
                      message: All required adapters report Available=True for the tracked generation
                      observed_generation: 2
                      created_time: '2021-01-01T10:00:00Z'
                      last_updated_time: '2021-01-01T10:00:00Z'
                      last_transition_time: '2021-01-01T10:00:00Z'
                    - type: PlacementSuccessful
                      status: 'True'
                      reason: This adapter1 is available
                      message: This adapter1 is available
                      observed_generation: 2
                      created_time: '2021-01-01T10:00:00Z'
                      last_updated_time: '2021-01-01T10:00:00Z'
                      last_transition_time: '2021-01-01T10:00:00Z'
                    - type: HostedClusterSuccessful
                      status: 'True'
                      reason: This adapter2 is available
                      message: This adapter2 is available
                      observed_generation: 2
                      created_time: '2021-01-01T10:01:00Z'
                      last_updated_time: '2021-01-01T10:01:00Z'
                      last_transition_time: '2021-01-01T10:01:00Z'
                created_time: '2021-01-01T00:00:00Z'
                updated_time: '2021-01-01T10:02:00Z'
                deleted_time: '2021-01-01T10:05:00Z'
                created_by: user@redhat.com
                updated_by: user@redhat.com
                deleted_by: user@redhat.com
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestDetails'
        '401':
          description: The request requires valid authentication credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedDetails'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotFoundDetails'
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      tags:
        - Clusters
      security:
        - BearerAuth: []
